<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바 차트 실습</title>
    <style>
        .container {
            margin: 0 auto;
            max-width: 800px;
            display: flex;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="width: 500px;"><canvas id="lineChart"></canvas></div>
        <div style="width: 500px;"><canvas id="barChart"></canvas></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: ['16시', '17시', '18시', '19시', '20시', '21시', '22시', '23시', '0시', '1시', '2시', '3시', '4시'],
                datasets: [{
                    label: '날씨',
                    data: [7, 6, 7, 6, 5, 4, 3, 3, 2, 2, 1, 1, 1],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.3, // 선의 곡선화
                    fill: true,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)'
                }]
            }
        });

        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['3.09.', '3.10.', '3.11.', '3.12.', '3.13.', '3.14.', '3.15.', '3.16.', '3.17.', '3.18.'],
                datasets: [{
                    label: '최고 기온',
                    data: [8, 10, 13, 11, 12, 9, 13, 11, 12, 12],
                    backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56'],
                }]
            },
            options: {
                scales: { y: { beginAtZero: true } }
            }
        });
    </script>
</body>

</html>
