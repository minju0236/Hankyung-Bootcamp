<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일한경</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      max-width: 360px;
      margin: 0 auto;
      background: #fff;
    }

    header {
      padding: 20px 0;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      border-bottom: 1px solid #ddd;
    }

    nav {
      display: flex;
      border-bottom: 1px solid #ddd;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 15px;
      color: #999;
      cursor: pointer;
      position: relative;
      transition: 0.3s;
    }

    .tab.active {
      color: #000;
      font-weight: bold;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 20%;
      width: 60%;
      height: 3px;
      background: #000;
    }

    main {
      padding: 20px;
    }

    section {
      display: none;
    }

    section.active {
      display: block;
    }
  </style>
</head>

<body>

  <header>
    모바일한경
  </header>

  <nav>
    <div class="tab active" data-tab="paper">신문보기</div>
    <div class="tab" data-tab="news">최신뉴스</div>
  </nav>

  <main>
    <section id="paper" class="active">
      <h2>신문보기</h2>
      <p>오늘의 신문 지면을 확인할 수 있습니다.</p>
    </section>

    <section id="news">
      <h2>최신뉴스</h2>
      <p>실시간 최신 뉴스 목록이 표시됩니다.</p>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const sections = document.querySelectorAll("main section");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {

        // 탭 active 제거
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        // 콘텐츠 변경
        sections.forEach(section => {
          section.classList.remove("active");
        });

        const target = document.getElementById(tab.dataset.tab);
        target.classList.add("active");
      });
    });
  </script>

</body>
</html>
