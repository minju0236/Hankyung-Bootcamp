<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 대통령 대시보드</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;

            --status-wait-bg: #d1fae5;
            --status-wait-text: #065f46;

            --status-delay-bg: #fee2e2;
            --status-delay-text: #991b1b;

            --status-done-bg: #e5e7eb;
            --status-done-text: #374151;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header-area {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .count-info {
            color: var(--text-muted);
            font-size: 14px;
        }

        .table-wrapper {
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #fcfcfd;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
        }

        td {
            padding: 16px;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .customer-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-wait {
            background-color: var(--status-wait-bg);
            color: var(--status-wait-text);
        }

        .status-delay {
            background-color: var(--status-delay-bg);
            color: var(--status-delay-text);
        }

        .status-done {
            background-color: var(--status-done-bg);
            color: var(--status-done-text);
        }

        .term-id {
            font-weight: bold;
            color: var(--primary-color);
        }

        .vote-text {
            font-weight: 700;
            text-align: right;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header-area">
            <div>
                <h2>대한민국 대통령 대시보드</h2>
            </div>
            <div class="count-info" id="total-count">Total: 0 records</div>
        </div>

        <div class="table-wrapper">
            <table>

                <thead>
                    <tr>
                        <th style="width:60px;text-align:center;">NO</th>
                        <th>대통령</th>
                        <th>대</th>
                        <th>임기기간</th>
                        <th style="text-align:right;">득표율</th>
                        <th style="text-align:center;">상태</th>
                    </tr>
                </thead>

                <tbody id="list"></tbody>

            </table>
        </div>

    </div>

    <script src="./presidentData.js"></script>

    <script>
        const tbody = document.getElementById('list');

        function getStatusClass(status) {
            if (status === '진행 중') return 'status-wait';
            if (status === '중단') return 'status-delay';
            return 'status-done';
        }

        document.getElementById('total-count').innerText = `총 ${presidentData.length}명의 대통령 데이터`;

        tbody.innerHTML = presidentData.map(item => {

            const userPhoto = `<img src="./${item.name}.png" alt="${item.name}" onerror="this.src='./person.png'">`;

            return `
            <tr>
                <td style="text-align:center;color:var(--text-muted);font-size:13px;">${item.id}</td>

                <td>
                    <div class="customer-box">

                        <div class="avatar">${userPhoto}</div>

                        <div style="font-weight:600;">${item.name}</div>

                    </div>
                </td>

                <td class="term-id">${item.term}</td>

                <td>${item.period}</td>

                <td class="vote-text">${item.vote}</td>

                <td style="text-align:center;">
                    <span class="badge ${getStatusClass(item.status)}">${item.status}</span>
                </td>

            </tr>
        `;

        }).join('');

    </script>

</body>

</html>
