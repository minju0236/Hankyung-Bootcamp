<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 금융 대출 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --status-wait-bg: #fef3c7;
            --status-wait-text: #92400e;
            --status-delay-bg: #fee2e2;
            --status-delay-text: #991b1b;
            --status-done-bg: #d1fae5;
            --status-done-text: #065f46;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header-area {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .count-info {
            color: var(--text-muted);
            font-size: 14px;
        }

        .table-wrapper {
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #fcfcfd;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
        }

        td {
            padding: 16px;
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background-color: #f8fafc;
            transition: background 0.2s ease;
        }

        .customer-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-wait {
            background-color: var(--status-wait-bg);
            color: var(--status-wait-text);
        }

        .status-delay {
            background-color: var(--status-delay-bg);
            color: var(--status-delay-text);
        }

        .status-done {
            background-color: var(--status-done-bg);
            color: var(--status-done-text);
        }

        .loan-id {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--primary-color);
        }

        .amount-text {
            font-weight: 700;
            text-align: right;
        }

        .address-text {
            color: var(--text-muted);
            font-size: 13px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-area">
            <div>
                <h2>여신 대출 현황 대시보드</h2>
            </div>
            <div class="count-info" id="total-count">Total: 0 records</div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">NO</th>
                        <th>고객명 / 연락처</th>
                        <th>대출번호</th>
                        <th style="text-align: right;">대출금액(원)</th>
                        <th style="text-align: center;">상태</th>
                        <th>주소</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>

    <script src="./loan.js"></script>

    <script>
        const tbody = document.getElementById('list');

        function getStatusClass(status) {
            if (status === '심사 중') return 'status-wait';
            if (status.includes('연체')) return 'status-delay';
            return 'status-done';
        }

        if (typeof loanData !== 'undefined') {
            document.getElementById('total-count').innerText = `총 ${loanData.length}건의 금융 데이터`;

            tbody.innerHTML = loanData.map(item => {
                // [이미지 처리 로직]
                // 1. 먼저 고객명.png 파일을 불러옵니다.
                // 2. 만약 파일이 없어서 에러(onerror)가 나면 person.png로 교체합니다.
                const userPhoto = `<img src="./${item.customer}.png" alt="${item.customer}" onerror="this.src='./person.png'">`;

                return `
                <tr>
                    <td style="text-align: center; color: var(--text-muted); font-size: 13px;">${item.id}</td>
                    <td>
                        <div class="customer-box">
                            <div class="avatar">${userPhoto}</div>
                            <div>
                                <div style="font-weight:600;">${item.customer}</div>
                                <div style="font-size:12px; color:var(--text-muted);">${item.phone}</div>
                            </div>
                        </div>
                    </td>
                    <td class="loan-id">${item.loanId}</td>
                    <td class="amount-text">${item.amount}</td>
                    <td style="text-align: center;">
                        <span class="badge ${getStatusClass(item.status)}">${item.status}</span>
                    </td>
                    <td class="address-text" title="${item.address}">${item.address}</td>
                </tr>
            `;
            }).slice(0, 5).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="6" style="padding: 50px; text-align:center; color: red;">loan.js 데이터를 찾을 수 없습니다.</td></tr>`;
        }
    </script>
</body>

</html>
