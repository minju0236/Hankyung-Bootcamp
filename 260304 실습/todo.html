<!DOCTYPE html>
<html>

<head>
    <style>
        .todo-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: 0.3s;
        }

        /* 완료되었을 때 적용할 스타일 */
        .done {
            background-color: #d4edda;
            text-decoration: line-through;
            color: #155724;
        }

        .important {
            border-left: 5px solid red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h3>오늘의 할 일 (클릭하여 완료)</h3>
    <ul>
        <li class="todo-item important">자바스크립트 DOM 공부하기</li>
        <li class="todo-item">querySelector 복습</li>
        <li class="todo-item">classList 실습해보기</li>
    </ul>

    <button id="check-all">모두 선택/해제</button>

    <script>
        // 1. querySelectorAll로 모든 리스트 아이템 가져오기
        const items = document.querySelectorAll('.todo-item');

        // 2. 각 아이템에 클릭 이벤트 연결 (반복문 사용)
        items.forEach(item => {
            item.onclick = () => {
                // classList.toggle을 사용해 'done' 클래스 탈부착
                item.classList.toggle('done');
            };
        });

        // 3. 전체 선택 버튼 로직
        document.querySelector('#check-all').onclick = () => {
            const allDone = [...items].every(item => item.classList.contains('done'));

            items.forEach(item => {
                if (allDone) {
                    item.classList.remove('done');
                } else {
                    item.classList.add('done');
                }
            });
        };
    </script>

</body>

</html>
