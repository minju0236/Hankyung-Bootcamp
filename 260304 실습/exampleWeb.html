<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flex Layout 실습</title>
    <style>
        /* 1. 기본 초기화 및 전체 구조 잡기 */
        * {
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f5; /* 배경색을 살짝 주어 컨테이너들을 돋보이게 함 */
            display: flex;
            flex-direction: column; /* 세 개의 큰 컨테이너를 종방향(세로)으로 배치 */
            min-height: 100vh;      /* 화면 전체 높이를 차지하게 함 */
            gap: 15px;              /* 컨테이너 사이의 간격 */
        }

        /* 2. 공통 컨테이너 스타일 (중복 코드 제거용) */
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 1400px; /* 너무 넓어지지 않게 제한 */
            margin: 0 auto;    /* 중앙 정렬 */
        }

        /* 3. 헤더 영역 */
        .header-container {
            height: 80px;
        }

        .logo img {
            height: 30px;
            width: auto;
            display: block;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .nav-menu li a:hover {
            color: #3498db;
        }

        /* 4. 메인 영역 (flex-grow를 주어 남은 공간을 차지하게 함) */
        .main-container {
            flex-grow: 1; 
            align-items: stretch; 
            gap: 20px;
            padding-top: 20px;    /* 위아래 여백을 주고 싶다면 높이 대신 패딩 사용 */
            padding-bottom: 20px;
        }

        .main, .aside {
            flex: 2; 
            /* height: 100%는 삭제해도 stretch 덕분에 꽉 찹니다 */
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            background-color: #fff; /* 배경색이 있어야 꽉 찬 게 보입니다 */
        }

        .aside {
            flex: 1;
        }

        /* 5. 푸터 영역 */
        .footer-container {
            height: auto; /* 내용에 따라 조절되도록 */
            padding: 40px;
            gap: 40px;
            align-items: flex-start; /* 푸터 내용은 위쪽 정렬이 보기 좋음 */
        }

        .address, .as_center {
            line-height: 1.6;
            font-size: 14px;
            color: #666;
        }

        .address strong, .as_center strong {
            display: inline-block;
            margin-bottom: 8px;
            color: #333;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header class="header-container container">
        <div class="logo">
            <a href="#">
                <img src="logo.png" alt="서비스 로고">
            </a>
        </div> 
        <nav>
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container container">
        <article class="main">
            <h3>Main Content</h3>
            <p>여기에 주요 내용을 작성하세요.</p>
        </article>

        <aside class="aside">
            <h3>Side Bar</h3>
            <p>광고나 공지사항 영역입니다.</p>
        </aside>
    </main>

    <footer class="footer-container container">
        <div class="address">
            <p> <strong>토스뱅크</strong> <br>
                사업자 등록번호 : 462-86-01671<br>
                주소 : 06133 서울특별시 강남구 테헤란로 131, 13층<br>
                대표 : 이은미
            </p>
        </div>

        <div class="as_center">
            <p> <strong>고객센터</strong> <br>
                전화 : 1661-7654 (24시간 연중무휴)<br>
                해외전화 : +82-2-6975-9000<br>
                이메일 : help@tossbank.com
            </p>
        </div>
    </footer>

</body>
</html>
