<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국사능력검정시험 | 결과</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8f9fa; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header-box { background: white; border-radius: 15px; padding: 30px; text-align: center; border: 1px solid #dee2e6; margin-bottom: 30px; }
        .user-info { font-size: 24px; color: #2d5bff; margin-bottom: 10px; }
        .score-big { font-size: 48px; font-weight: 800; color: #212529; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        .wrong-text { color: #d63939; font-weight: 700; }
        .correct-text { color: #2fb344; font-weight: 700; }
        .exp-box { background: #f1f3f5; padding: 15px; border-radius: 6px; margin-top: 15px; font-size: 14px; border-left: 4px solid #2d5bff; }
        
        /* 버튼 스타일 추가 */
        .btn-group { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 30px; cursor: pointer; border-radius: 5px; border: 1px solid #dee2e6; font-weight: 700; }
        .btn-analysis { background: #2d5bff; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="result-content"></div>
        
        <div class="btn-group">
            <button class="btn" onclick="location.href='history.html'">다시 풀기</button>
            <button class="btn btn-analysis" onclick="location.href='analysis.html'">결과 분석</button>
        </div>
    </div>

    <script src="./history.js"></script>
    <script>
        function loadResult() {
            // 1. JSON 데이터 로드
            const jsonStr = localStorage.getItem('testResult');
            if (!jsonStr) {
                alert("결과 데이터가 없습니다.");
                location.href = 'history.html';
                return;
            }
            const data = JSON.parse(jsonStr); // JSON 문자열을 객체로 변환

            let score = 0;
            let reportHTML = '';

            historyData.forEach((q, idx) => {
                const uAns = data.answers[idx];
                const isCorrect = uAns === q.answer;
                if (isCorrect) score++;
                else {
                    reportHTML += `
                        <div class="card">
                            <div class="wrong-text">문항 ${q.id} 오답</div>
                            <div style="font-weight:700; margin: 10px 0;">${q.question}</div>
                            <div style="font-size: 14px;">
                                <p>선택한 답: <span class="wrong-text">${uAns !== undefined ? q.options[uAns] : '미선택'}</span></p>
                                <p>정답: <span class="correct-text">${q.options[q.answer]}</span></p>
                            </div>
                            <div class="exp-box"><strong>해설:</strong> ${q.explanation}</div>
                        </div>
                    `;
                }
            });

            const scorePercent = Math.round((score / historyData.length) * 100);

            // 2. 화면 출력
            document.getElementById('result-content').innerHTML = `
                <div class="header-box">
                    <div class="user-info">🎖️ ${data.userName} 님의 성적표</div>
                    <div class="score-big">${scorePercent}점</div>
                    <div style="color: #6c757d;">응시 시간: ${data.date}</div>
                </div>
                <h3 style="margin-left: 10px;">오답 노트</h3>
                ${reportHTML || '<p style="text-align:center;">틀린 문제가 없습니다! 완벽합니다!</p>'}
            `;
        }

        loadResult();
    </script>
</body>
</html>
