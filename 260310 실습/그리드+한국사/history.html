<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: grid;
            height: 100vh;
            /* 가로: 사이드바(250px) 고정, 나머지는 비율로 배분 */
            grid-template-columns: 250px 1fr 1fr;
            /* 세로: 헤더(80px) 고정, 나머지는 화면 꽉 채우기 */
            grid-template-rows: 80px 1fr 1fr 120px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 1. 상단 헤더 영역 (전체 가로 병합) */
        .header {
            background-color: #2c3e50;
            grid-column: span 3;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bootcamp-text {
            font-size: 1.1rem;
            color: #ecf0f1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        nav ul li:hover {
            opacity: 1;
        }

        /* 2. 좌측 사이드바 영역 (세로 전체 병합) */
        .sidebar {
            background-color: #34495e;
            grid-column: 1;
            grid-row: 2 / 5;
            /* 2행선부터 4행선 직전까지 : 3칸이면 줄은 4개가 생김 2번선에서 4번선 의미 (세로 2칸 합침) */
            flex-direction: column;
            /* 메뉴를 세로로 나열 */
            justify-content: flex-start;
            padding-top: 30px;
        }

        .sidebar-menu {
            width: 100%;
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sidebar-menu li:hover {
            background-color: #2c3e50;
        }

        /* 3. 메인 콘텐츠 영역 (나머지 공간 전체 병합) */
        .main-content {
            background-color: #ecf0f1;
            color: #2c3e50;
            grid-column: 2 / 4;
            /* 2열부터 끝까지 */
            grid-row: 2 / 4;
            /* 2행부터 끝까지 */
            font-size: 2rem;
            overflow: auto;
            /* display: flex;
            justify-content: center; */
            align-items: flex-start;
            padding: 40px 0px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .name-section {
            background: white;
            border: 2px solid #2d5bff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .name-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .q-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .option-item {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            text-align: left;
            cursor: pointer;
            background: #fff;
        }

        .option-item.selected {
            background: #2d5bff;
            color: white;
            border-color: #2d5bff;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 20px;
            background: #2d5bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer {
            grid-column: 2 / 4;
            background: #7f8b9760;
        }
    </style>
    </style>
</head>

<body>
    <header class="item header">
        <div class="logo-group">
            <div class="logo">LOGO</div>
            <div class="bootcamp-text">부트캠프</div>
        </div>
        <nav>
            <ul>
                <li>알림</li>
                <li>마이페이지</li>
                <li>로그아웃</li>
            </ul>
        </nav>
    </header>

    <aside class="item sidebar">
        <ul class="sidebar-menu">
            <li>대시보드 홈</li>
            <li>수강생 관리</li>
            <li>과제 채점</li>
            <li>커리큘럼 설정</li>
            <li>통계 데이터</li>
        </ul>
    </aside>

    <main class="item main-content">
        <div class="container">
            <h1 style="text-align: center; color: #2d5bff;">✍️ 한국사능력검정시험</h1>

            <div class="name-section">
                <label>응시자 성함:</label>
                <input type="text" id="user-name" class="name-input" placeholder="이름을 입력하세요">
            </div>

            <div id="quiz-list"></div>
            <button class="btn-submit" onclick="saveAndGo()">시험 종료 및 결과 확인</button>
        </div>
    </main>

    <footer class="item footer">
        주@한국사능력검정시험
    </footer>

    <script src="./history.js"></script>
    <script>
        const userAnswers = {};

        function render() {
            const list = document.getElementById('quiz-list');
            list.innerHTML = historyData.map((q, qIdx) => `
                <div class="card">
                    <div class="q-title">${q.id}. ${q.question}</div>
                    ${q.options.map((opt, oIdx) => `
                        <button class="option-item" id="opt-${qIdx}-${oIdx}" onclick="select(${qIdx}, ${oIdx})">
                            ${oIdx + 1}. ${opt}
                        </button>
                    `).join('')}
                </div>
            `).join('');
        }

        function select(qIdx, oIdx) {
            document.querySelectorAll(`[id^="opt-${qIdx}-"]`).forEach(b => b.classList.remove('selected'));
            document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('selected');
            userAnswers[qIdx] = oIdx;
        }

        function saveAndGo() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("이름을 입력해주세요.");

            // JSON 형식의 객체 생성
            const resultData = {
                userName: name,
                answers: userAnswers,
                date: new Date().toLocaleString()
            };

            // result.js의 역할을 대신할 데이터를 localStorage에 JSON 문자열로 저장
            localStorage.setItem('testResult', JSON.stringify(resultData));
            location.href = 'result.html';
        }
        render();
    </script>
</body>

</html>
