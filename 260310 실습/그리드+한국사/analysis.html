<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: grid;
            height: 100vh;
            /* 가로: 사이드바(250px) 고정, 나머지는 비율로 배분 */
            grid-template-columns: 250px 1fr 1fr;
            /* 세로: 헤더(80px) 고정, 나머지는 화면 꽉 채우기 */
            grid-template-rows: 80px 1fr 1fr;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 1. 상단 헤더 영역 (전체 가로 병합) */
        .header {
            background-color: #2c3e50;
            grid-column: span 3;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bootcamp-text {
            font-size: 1.1rem;
            color: #ecf0f1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        nav ul li:hover {
            opacity: 1;
        }

        /* 2. 좌측 사이드바 영역 (세로 전체 병합) */
        .sidebar {
            background-color: #34495e;
            grid-column: 1;
            grid-row: 2 / 4;
            /* 2행선부터 4행선 직전까지 : 3칸이면 줄은 4개가 생김 2번선에서 4번선 의미 (세로 2칸 합침) */
            flex-direction: column;
            /* 메뉴를 세로로 나열 */
            justify-content: flex-start;
            padding-top: 30px;
        }

        .sidebar-menu {
            width: 100%;
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sidebar-menu li:hover {
            background-color: #2c3e50;
        }

        /* 3. 메인 콘텐츠 영역 (나머지 공간 전체 병합) */
        .main-content {
            background-color: #ecf0f1;
            color: #2c3e50;
            grid-column: 2 / 4;
            /* 2열부터 끝까지 */
            grid-row: 2 / 4;
            /* 2행부터 끝까지 */
            font-size: 2rem;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2d5bff;
        }

        .chart-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .chart-box {
            width: 350px;
            text-align: center;
        }

        .info-text {
            margin-top: 20px;
            text-align: center;
            color: #666;
        }

        .btn-back {
            display: block;
            width: 150px;
            margin: 30px auto;
            padding: 10px;
            text-align: center;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <header class="item header">
        <div class="logo-group">
            <div class="logo">LOGO</div>
            <div class="bootcamp-text">부트캠프</div>
        </div>
        <nav>
            <ul>
                <li>알림</li>
                <li>마이페이지</li>
                <li>로그아웃</li>
            </ul>
        </nav>
    </header>

    <aside class="item sidebar">
        <ul class="sidebar-menu">
            <li>대시보드 홈</li>
            <li>수강생 관리</li>
            <li>과제 채점</li>
            <li>커리큘럼 설정</li>
            <li>통계 데이터</li>
        </ul>
    </aside>

    <main class="item main-content">
        <div class="container">
            <h1 id="user-title">결과 분석 보고서</h1>
            <div class="info-text" id="info-text"></div>

            <div class="chart-wrapper">
                <div class="chart-box">
                    <h3>전체 정답률</h3>
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>카테고리별 성적</h3>
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <a href="result.html" class="btn-back">뒤로 가기</a>
        </div>
    </main>

    <script src="./history.js"></script>
    <script>
        function renderAnalysis() {
            const jsonStr = localStorage.getItem('testResult');
            if (!jsonStr) {
                alert("데이터가 없습니다.");
                location.href = 'history.html';
                return;
            }
            const data = JSON.parse(jsonStr);
            document.getElementById('user-title').innerText = `${data.userName} 님의 분석 리포트`;

            // 데이터 분석 로직
            let correctCount = 0;
            let totalCount = historyData.length;
            const categoryStats = {}; // { "선사": {total: 2, correct: 1}, ... }

            historyData.forEach((q, idx) => {
                const isCorrect = data.answers[idx] === q.answer;

                // 전체 집계
                if (isCorrect) correctCount++;

                // 카테고리별 집계
                if (!categoryStats[q.category]) {
                    categoryStats[q.category] = { total: 0, correct: 0 };
                }
                categoryStats[q.category].total++;
                if (isCorrect) categoryStats[q.category].correct++;
            });

            // 1. 파이 차트 그리기 (정답 vs 오답)
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['정답', '오답'],
                    datasets: [{
                        data: [correctCount, totalCount - correctCount],
                        backgroundColor: ['#99fec5', '#ff666d']
                    }]
                }
            });

            // 2. 바 차트 그리기 (카테고리별)
            const catLabels = Object.keys(categoryStats);
            const catData = catLabels.map(cat => categoryStats[cat].correct);

            new Chart(document.getElementById('barChart'), {
                type: 'line',
                data: {
                    labels: catLabels,
                    datasets: [{
                        label: '맞힌 개수',
                        data: catData,
                        backgroundColor: '#7085ff',
                        fill: 'origin',
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });

            document.getElementById('info-text').innerText = `총 ${totalCount}문제 중 ${correctCount}문제를 맞혔습니다.`;
        }

        renderAnalysis();
    </script>
</body>

</html>
