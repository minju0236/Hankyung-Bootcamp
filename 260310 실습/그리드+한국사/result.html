<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: grid;
            height: 100vh;
            /* 가로: 사이드바(250px) 고정, 나머지는 비율로 배분 */
            grid-template-columns: 250px 1fr 1fr;
            /* 세로: 헤더(80px) 고정, 나머지는 화면 꽉 채우기 */
            grid-template-rows: 80px 1fr 1fr;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 1. 상단 헤더 영역 (전체 가로 병합) */
        .header {
            background-color: #2c3e50;
            grid-column: span 3;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bootcamp-text {
            font-size: 1.1rem;
            color: #ecf0f1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        nav ul li:hover {
            opacity: 1;
        }

        /* 2. 좌측 사이드바 영역 (세로 전체 병합) */
        .sidebar {
            background-color: #34495e;
            grid-column: 1;
            grid-row: 2 / 4;
            /* 2행선부터 4행선 직전까지 : 3칸이면 줄은 4개가 생김 2번선에서 4번선 의미 (세로 2칸 합침) */
            flex-direction: column;
            /* 메뉴를 세로로 나열 */
            justify-content: flex-start;
            padding-top: 30px;
        }

        .sidebar-menu {
            width: 100%;
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sidebar-menu li:hover {
            background-color: #2c3e50;
        }

        /* 3. 메인 콘텐츠 영역 (나머지 공간 전체 병합) */
        .main-content {
            background-color: #ecf0f1;
            color: #2c3e50;
            grid-column: 2 / 4;
            /* 2열부터 끝까지 */
            grid-row: 2 / 4;
            /* 2행부터 끝까지 */
            font-size: 2rem;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .header-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 1px solid #dee2e6;
            margin-bottom: 30px;
        }

        .user-info {
            font-size: 24px;
            color: #2d5bff;
            margin-bottom: 10px;
        }

        .score-big {
            font-size: 48px;
            font-weight: 800;
            color: #212529;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .wrong-text {
            color: #d63939;
            font-weight: 700;
        }

        .correct-text {
            color: #2fb344;
            font-weight: 700;
        }

        .exp-box {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
            border-left: 4px solid #2d5bff;
        }

        /* 버튼 스타일 추가 */
        .btn-group {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 30px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            font-weight: 700;
        }

        .btn-analysis {
            background: #2d5bff;
            color: white;
            border: none;
        }
    </style>
    </style>
    </style>
</head>

<body>
    <header class="item header">
        <div class="logo-group">
            <div class="logo">LOGO</div>
            <div class="bootcamp-text">부트캠프</div>
        </div>
        <nav>
            <ul>
                <li>알림</li>
                <li>마이페이지</li>
                <li>로그아웃</li>
            </ul>
        </nav>
    </header>

    <aside class="item sidebar">
        <ul class="sidebar-menu">
            <li>대시보드 홈</li>
            <li>수강생 관리</li>
            <li>과제 채점</li>
            <li>커리큘럼 설정</li>
            <li>통계 데이터</li>
        </ul>
    </aside>

    <main class="item main-content">
        <div class="container">
            <div id="result-content"></div>

            <div class="btn-group">
                <button class="btn" onclick="location.href='history.html'">다시 풀기</button>
                <button class="btn btn-analysis" onclick="location.href='analysis.html'">결과 분석</button>
            </div>
        </div>
    </main>

    <script src="./history.js"></script>
    <script>
        function loadResult() {
            // 1. JSON 데이터 로드
            const jsonStr = localStorage.getItem('testResult');
            if (!jsonStr) {
                alert("결과 데이터가 없습니다.");
                location.href = 'history.html';
                return;
            }
            const data = JSON.parse(jsonStr); // JSON 문자열을 객체로 변환

            let score = 0;
            let reportHTML = '';

            historyData.forEach((q, idx) => {
                const uAns = data.answers[idx];
                const isCorrect = uAns === q.answer;
                if (isCorrect) score++;
                else {
                    reportHTML += `
                        <div class="card">
                            <div class="wrong-text">문항 ${q.id} 오답</div>
                            <div style="font-weight:700; margin: 10px 0;">${q.question}</div>
                            <div style="font-size: 14px;">
                                <p>선택한 답: <span class="wrong-text">${uAns !== undefined ? q.options[uAns] : '미선택'}</span></p>
                                <p>정답: <span class="correct-text">${q.options[q.answer]}</span></p>
                            </div>
                            <div class="exp-box"><strong>해설:</strong> ${q.explanation}</div>
                        </div>
                    `;
                }
            });

            const scorePercent = Math.round((score / historyData.length) * 100);

            // 2. 화면 출력
            document.getElementById('result-content').innerHTML = `
                <div class="header-box">
                    <div class="user-info">🎖️ ${data.userName} 님의 성적표</div>
                    <div class="score-big">${scorePercent}점</div>
                    <div style="color: #6c757d;">응시 시간: ${data.date}</div>
                </div>
                <h3 style="margin-left: 10px;">오답 노트</h3>
                ${reportHTML || '<p style="text-align:center;">틀린 문제가 없습니다! 완벽합니다!</p>'}
            `;
        }

        loadResult();
    </script>
</body>

</html>
