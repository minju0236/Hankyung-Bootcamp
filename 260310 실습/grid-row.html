<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: grid;
            height: 100vh;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .color1 { 
            background-color: #2c3e50; 
            grid-column: span 3; 
            display: flex;
            justify-content: space-between; 
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* 로고와 부트캠프를 묶는 그룹 스타일 */
        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px; /* 로고와 글자 사이의 간격 */
        }

        .bootcamp-text {
            font-size: 1.1rem;
            color: #ecf0f1;
        }
        
        .color1 nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .color1 nav ul li {
            cursor: pointer;
            font-size: 0.9rem;
        }

        .color2 { background-color: #e74c3c; grid-column: 1; grid-row: 2; } 
        .color3 { background-color: #3498db; grid-column: 1; grid-row: 3; } 
    </style>
</head>
<body>
    <div class="item color1">
        <div class="logo-group">
            <div class="logo">LOGO</div>
            <div class="bootcamp-text">부트캠프</div>
        </div>

        <nav>
            <ul>
                <li>메뉴1</li>
                <li>메뉴2</li>
                <li>메뉴3</li>
            </ul>
        </nav>
    </div>
    <div class="item color2">2행 1열</div>
    <div class="item color3">3행 1열</div>
</body>
</html>
