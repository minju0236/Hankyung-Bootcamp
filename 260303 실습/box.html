<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>박스모델과 플렉스 실습</title>
    <style>
        /* 1. 박스모델 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 2. 최상위 부모(body) 설정 */
        body {
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* 자식인 container를 플렉스로 관리 */
            background-color: #e9ecef;
        }

        /* 3. 플렉스 컨테이너 (부모) */
        .container {
            display: flex;
            /* 자식 아이템들을 가로로 나열 */
            flex-wrap: wrap;
            /* 자리가 모자라면 줄 바꿈(Wrap) */
            width: 600px;
            /* 전체 컨테이너 너비 고정 */
            gap: 20px;
            /* 박스 사이의 물리적 간격 */
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 4. 플렉스 아이템 (자식 4개) */
        .item {
            /* 한 줄에 2개씩 배치 (50%에서 간격의 절반인 10px 제외) */
            width: calc(50% - 10px);
            height: 150px;

            /* 박스모델 상세 정의 */
            background-color: #3498db;
            border: 4px solid #2980b9;
            /* 테두리 */
            padding: 20px;
            /* 안쪽 여백 */
            color: white;

            /* 내용물 중앙 정렬 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">BOX 1</div>
        <div class="item">BOX 2</div>
        <div class="item">BOX 3</div>
        <div class="item">BOX 4</div>
    </div>
        <div class="container">
        <div class="item">BOX 1</div>
        <div class="item">BOX 2</div>
        <div class="item">BOX 3</div>
        <div class="item">BOX 4</div>
    </div>

</body>

</html>
