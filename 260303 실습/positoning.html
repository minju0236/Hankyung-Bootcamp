<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {

            padding: 0;
            margin: 0;
            display: flex;
            /* 자식 아이템들을 가로로 나열 */
            flex-wrap: wrap;
            /* 자리가 모자라면 줄 바꿈(Wrap) */
            justify-content: center;
            /* 가로 중앙 정렬 */
            align-items: center;
            /* 세로축 중앙 정렬 */
            min-height: 100vh;
            /* 높이를 지정해야 세로축 중앙 정렬이 의미 있음 */

        }

        .container {
            display: flex;
            /* 자식 아이템들을 가로로 나열 */
            flex-wrap: wrap;
            /* 자리가 모자라면 줄 바꿈(Wrap) */
            justify-content: center;
            /* 가로 중앙 정렬 */
            align-items: center;
            /* 세로축 중앙 정렬 */
            width: 800px;
            /* 전체 컨테이너 너비 고정, 꽉 채우고 싶다면 100% */
            gap: 20px;
            /* 박스 사이의 물리적 간격 */
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .parent {
            /* 1.2 position 속성: 자식의 기준점이 되기 위해 relative를 부여 */
            position: relative;
            width: 300px;
            height: 150px;
            background-color: #f0f0f0;
            border: 2px solid #333;
        }

        .child {
            /* 1.2 position 속성: 부모를 기준으로 흐름에서 이탈(유령 상태) */
            position: absolute;

            /* 1.3 좌표 속성: 부모의 '천장'과 '오른쪽 벽'을 기준으로 위치 고정 */
            top: 10px;
            /* 위쪽 경계선에서 10px 아래로 밀어냄 */
            right: 10px;
            /* 오른쪽 경계선에서 10px 왼쪽으로 밀어냄 */

            width: 80px;
            height: 40px;
            background-color: #3498db;
            color: white;
        }

        .next-content {
            /* 1.1 일반적인 흐름: .child가 absolute로 빠졌기 때문에 이 박스는 .parent 바로 아래에 붙습니다. */
            background-color: #e74c3c;
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="parent">
            부모 박스 (Relative)
            <div class="child">
                자식 박스 (Absolute)
            </div>
        </div>
        <div class="next-content">
            다음 콘텐츠 (Normal Flow)
        </div>
    </div>
</body>

</html>
