<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flex Header 실습</title>
    <style>
        /* 1. 박스모델 및 기본 초기화 */
        * {
            box-sizing: border-box; 
            /*실제 박스 크기는 딱 200px로 유지됩니다. (내부 콘텐츠 영역이 알아서 140px로 줄어듭니다.)*/
            margin: 0;
            padding: 0;
            background-color: white;
        }

        /* 2. 플렉스 컨테이너 (Header) */
        .header-container {
            display: flex;            /* 플렉스 레이아웃 선언 */
            justify-content: space-between; /* 자식 요소들을 양 끝으로 배치 */
            align-items: center;      /* 세로축 중앙 정렬 */
            padding: 0 40px;          /* 좌우 내 여백 */
            height: 80px;             /* 헤더 높이 */
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 3. 로고 스타일 */
                
        .logo img {
            height: 30px;          /* 헤더 높이(80px)보다 작게 설정하여 여유 공간 확보 */
            width: auto;           /* 가로 세로 비율 유지 */
            display: block;        /* 하단 미세 공백 제거 */
        }
                

        /* 4. 내비게이션 (메뉴 항목들도 Flex로 정렬) */
        .nav-menu {
            display: flex;            /* 메뉴 아이템들도 가로로 나열 */
            gap: 30px;                /* 메뉴 사이 간격 */
            list-style: none;         /* 불렛 제거 */
        }

        .nav-menu li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        
        .nav-menu li a:hover {
            color: #3498db;
        }

        .main-container {
            display: flex;            /* 플렉스 레이아웃 선언 */
            justify-content: space-between;
            align-items: center;      /* 세로축 중앙 정렬 */
            padding: 0 40px;          /* 좌우 내 여백 */
            height: 600px;             /* 헤더 높이 */
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top:10px;
            gap:10px;
        }

        .main {
            width:1000px;
            height:580px;
            border: 1px solid #ddd;
            border-radius: 10px;

        }

        .aside {
            width:400px;
            height:580px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .footer-container {
            display: flex;            /* 플렉스 레이아웃 선언 */
            justify-content: space-between;
            align-items: center;      /* 세로축 중앙 정렬 */
            padding: 0 40px;          /* 좌우 내 여백 */
            height: 140px;             /* 헤더 높이 */
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top:10px;
            gap:10px;
        }

        .address {
            width:1000px;
            height:110px;
            /*border: 1px solid #ddd;*/
            border-radius: 10px;

        }

        .as_center {
            width:400px;
            height:110px;
            /*border: 1px solid #ddd;*/
            border-radius: 10px;
        }



    </style>
</head>
<body>

    <header class="header-container">
        
        <div class="logo">
            <a href="#">
                <img src="logo.png" alt="서비스 로고">
            </a>
        </div> 
         

        <nav>
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <header class="main-container">
        <div class="main">
            <p> hello </p>
        </div>

        <div class="aside">
            <p> hello </p>
        </div>


    </header>

        <div class="address">

    </header>

</body>
</html>
