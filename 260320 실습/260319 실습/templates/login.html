<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="../static/auth.css" />
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo"><img src="../static/images/logo.png"></div>
            <nav class="nav">
                <a href="#">정치</a>
                <a href="#">경제</a>
                <a href="#">사회</a>
                <a href="#">문화</a>
                <a href="#">스포츠</a>
            </nav>
        </header>
        <div class="login-form">
            <h2>충정일보 로그인</h2>
            <input type="text" id="username" placeholder="아이디"><br><br>
            <input type="password" id="password" placeholder="비밀번호"><br><br>

            <button class="auth-btn" onclick="login()">로그인</button>
            <div class="login-redirect">아직 계정이 없다면? <a href="/signup">회원가입</a></div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                alert('로그인 성공');
                location.href = '/index';
            } else {
                alert('로그인 실패');
            }
        }
    </script>

</body>

</html>
