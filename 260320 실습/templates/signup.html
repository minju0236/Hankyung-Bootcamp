<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="../static/auth.css" />
</head>

<body>

    <div class="container">
        <header class="header">
            <div class="logo"><img src="../static/images/logo.png"></div>
            <nav class="nav">
                <a href="#">정치</a>
                <a href="#">경제</a>
                <a href="#">사회</a>
                <a href="#">문화</a>
                <a href="#">스포츠</a>
            </nav>
        </header>
        <div class="login-form">
            <h2>충정일보 회원가입</h2>
            <input type="text" id="username" placeholder="아이디"><br><br>
            <input type="password" id="password" placeholder="비밀번호"><br><br>

            <button class="auth-btn" onclick="signup()">회원가입</button>

            <div class="login-redirect"><a href="/login">로그인으로</a></div>
        </div>
    </div>

    <script>
        async function signup() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                alert('회원가입 성공');
                location.href = '/';
            } else {
                alert('회원가입 실패');
            }
        }
    </script>

</body>

</html>
